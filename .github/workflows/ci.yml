name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff>=0.1"
      - name: Run ruff
        run: ruff check fujicv/ tests/ examples/

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package + type stubs
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - name: Run mypy
        run: mypy fujicv/ --ignore-missing-imports --no-strict-optional --no-error-summary

  secrets-scan:
    name: Secret scan (detect-secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install detect-secrets
        run: pip install detect-secrets
      - name: Scan for new secrets against baseline
        run: |
          detect-secrets scan --baseline .secrets.baseline
          python -c "
          import json, sys
          data = json.load(open('.secrets.baseline'))
          results = data.get('results', {})
          secrets = {f: v for f, v in results.items() if v}
          if secrets:
              print('New secrets found:', json.dumps(secrets, indent=2))
              sys.exit(1)
          print('No secrets found.')
          "

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install CPU-only PyTorch
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Install package
        run: pip install -e ".[test]"
      - name: Run tests
        run: pytest tests/ -v --tb=short
